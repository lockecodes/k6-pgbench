apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "k6.clusterName" . }}-k6-init
  labels:
    {{- include "k6.labels" . | nindent 4 }}
    k6-pgbench/phase: init
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "k6.labels" . | nindent 8 }}
        k6-pgbench/phase: init
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.37
          command: ['sh', '-c']
          args:
            - |
              echo "Waiting for PostgreSQL at {{ include "k6.primaryHost" . }}:{{ .Values.connection.port }}..."
              until nc -z {{ include "k6.primaryHost" . }} {{ .Values.connection.port }}; do
                echo "PostgreSQL not ready, retrying in 2s..."
                sleep 2
              done
              echo "PostgreSQL is ready"
      containers:
        - name: k6-init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ['k6', 'run', '{{ include "k6.initScript" . }}']
          env:
            - name: K6_PG_HOST
              value: {{ include "k6.primaryHost" . | quote }}
            - name: K6_PG_PORT
              value: {{ .Values.connection.port | quote }}
            - name: K6_PG_USER
              value: {{ .Values.connection.user | quote }}
            - name: K6_PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "k6.secretName" . }}
                  key: password
            - name: K6_PG_DATABASE
              value: {{ .Values.connection.database | quote }}
            - name: K6_PGBENCH_SCALE
              value: {{ .Values.benchmark.scale | quote }}
            {{- if .Values.benchmark.warehouses }}
            - name: K6_TPCC_WAREHOUSES
              value: {{ .Values.benchmark.warehouses | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
